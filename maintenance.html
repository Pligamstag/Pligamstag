<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance en cours</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
        }

        .icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            position: relative;
        }

        .gear {
            width: 100%;
            height: 100%;
            border: 8px solid #667eea;
            border-radius: 50%;
            position: relative;
            animation: rotate 3s linear infinite;
        }

        .gear::before,
        .gear::after {
            content: '';
            position: absolute;
            background: #667eea;
        }

        .gear::before {
            width: 20px;
            height: 40px;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .gear::after {
            width: 40px;
            height: 20px;
            left: -20px;
            top: 50%;
            transform: translateY(-50%);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .message {
            color: #666;
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .status {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin: 30px 0;
            text-align: left;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 1.1em;
        }

        .label {
            font-weight: 600;
            color: #333;
        }

        .value {
            color: #667eea;
            font-weight: 500;
        }

        .footer {
            color: #999;
            font-size: 0.9em;
            margin-top: 30px;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <div class="gear"></div>
        </div>
        
        <h1>Maintenance en cours</h1>
        
        <p class="message">
            Notre site est actuellement en maintenance pour vous offrir une meilleure expérience. 
            Nous nous excusons pour la gêne occasionnée.
        </p>

        <div class="loader"></div>

        <div class="status">
            <div class="status-item">
                <span class="label">État :</span>
                <span class="value">En maintenance</span>
            </div>
            <div class="status-item">
                <span class="label">Date de retour :</span>
                <span class="value">Indéfinie</span>
            </div>
        </div>

        <p class="footer">
            Merci de votre patience et de votre compréhension.
        </p>
    </div>
</body>
</html>
